<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Англійський словник (A-Z)</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        #word-eng {
            font-size: 42px;
            margin: 0;
            color: #1a73e8;
            text-transform: capitalize;
        }

        #word-ukr {
            font-size: 24px;
            color: #5f6368;
            margin: 10px 0 20px;
            min-height: 1.2em;
        }

        #progress {
            font-size: 14px;
            color: #9aa0a6;
            margin-bottom: 25px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-prev {
            background-color: #dadce0;
            color: #3c4043;
        }

        .btn-next {
            background-color: #1a73e8;
            color: white;
            flex-grow: 1;
        }

        .btn-reset {
            background: none;
            color: #9aa0a6;
            font-size: 12px;
            margin-top: 30px;
            text-decoration: underline;
        }

        button:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="progress">Завантаження...</div>
        <h1 id="word-eng">---</h1>
        <p id="word-ukr">Завантаження словника...</p>
        
        <div class="controls">
            <button class="btn-prev" onclick="prevWord()">Назад</button>
            <button class="btn-next" onclick="nextWord()">Вперед</button>
        </div>

        <button class="btn-reset" onclick="resetProgress()">Почати спочатку</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
